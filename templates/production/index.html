{% extends "base.html" %}
{% block title %}생산/입고 - 오토툴{% endblock %}
{% block page_title %}생산/입고 관리{% endblock %}

{% block content %}
<div class="row g-4">
    <!-- 입고 섹션 -->
    <div class="col-lg-6">
        <div class="card h-100">
            <div class="card-header">
                <i class="bi bi-box-arrow-in-down"></i> 입고
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('production.inbound') }}" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">기준일</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">입력 모드</label>
                        <select name="mode" class="form-select">
                            <option value="신규입력">신규입력</option>
                            <option value="수정입력">수정입력 (기존 삭제 후 재입력)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">엑셀 파일</label>
                        <input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
                        <div class="form-text">입고 엑셀 파일(.xlsx/.xls)을 업로드하세요.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-upload"></i> 입고 업로드
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- 생산 섹션 -->
    <div class="col-lg-6">
        <div class="card h-100">
            <div class="card-header">
                <i class="bi bi-gear"></i> 생산
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('production.production') }}" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">기준일</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">위치</label>
                        <input type="text" name="location" class="form-control" placeholder="생산 위치 입력">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">입력 모드</label>
                        <select name="mode" class="form-select">
                            <option value="신규입력">신규입력</option>
                            <option value="수정입력">수정입력 (기존 삭제 후 재입력)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">엑셀 파일</label>
                        <input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
                        <div class="form-text">생산 엑셀 파일(.xlsx/.xls)을 업로드하세요.</div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-upload"></i> 생산 업로드
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
