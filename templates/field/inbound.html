{% extends "base.html" %}
{% block title %}입고 스캔 — 플로워{% endblock %}

{% block extra_css %}
<style>
    .scan-input-lg {
        font-size: 1.5rem; padding: 0.8rem 1rem; text-align: center;
        border: 2px solid var(--border); border-radius: 10px;
        font-family: 'Pretendard Variable', monospace;
    }
    .scan-input-lg:focus {
        border-color: var(--amber);
        box-shadow: 0 0 0 3px rgba(232,160,32,0.2);
        outline: none;
    }
    .result-card {
        border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 0.75rem;
        border: 2px solid var(--border);
        animation: slideIn 0.25s ease;
    }
    .result-card.success { border-color: #22c55e; background: rgba(34,197,94,0.06); }
    .result-card.error   { border-color: #ef4444; background: rgba(239,68,68,0.06); }
    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    .error-banner {
        position: fixed; top: 0; left: 0; right: 0;
        background: #ef4444; color: #fff; text-align: center;
        font-size: 1rem; font-weight: 700; padding: 0.75rem; z-index: 9999;
        display: none;
    }
    .error-banner.show { display: block; }
    .history-row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem;
    }
    .history-row:last-child { border-bottom: none; }
</style>
{% endblock %}

{% block content %}
<div id="errBanner" class="error-banner"></div>

<div class="page-header">
    <div>
        <h4><i class="bi bi-box-arrow-in-down me-2" style="color:#3b82f6;"></i>입고 스캔</h4>
    </div>
    <a href="/field" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>현장 홈
    </a>
</div>

<div class="page-body">

    {# 로케이션 선택 #}
    <div class="card mb-3">
        <div class="card-body">
            <label class="form-label fw-bold">보관 로케이션</label>
            <select id="locationSelect" class="form-select" style="font-size:1.05rem;">
                <option value="">로케이션 선택 *</option>
                {% for loc in locations|default([]) %}
                <option value="{{ loc.id }}">{{ loc.display or loc.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    {# 스캔 입력 #}
    <div class="card mb-3">
        <div class="card-body">
            <label class="form-label fw-bold">상품 바코드</label>
            <input type="text" id="barcodeInput" class="form-control scan-input-lg"
                   placeholder="바코드 스캔 대기..." autocomplete="off">
            <div class="row g-2 mt-2">
                <div class="col-6">
                    <label class="form-label" style="font-size:0.78rem;">수량</label>
                    <input type="number" id="qtyInput" class="form-control" value="1" min="1"
                           style="font-size:1.2rem;text-align:center;">
                </div>
                <div class="col-6">
                    <label class="form-label" style="font-size:0.78rem;">LOT (선택)</label>
                    <input type="text" id="lotInput" class="form-control" placeholder="LOT번호">
                </div>
            </div>
            <button id="inboundBtn" class="btn btn-lg w-100 mt-3"
                    style="background:#3b82f6;color:#fff;font-weight:700;font-size:1.1rem;"
                    onclick="processInbound()">
                <i class="bi bi-box-arrow-in-down me-2"></i>입고 처리
            </button>
        </div>
    </div>

    {# 결과 #}
    <div id="resultArea"></div>

    {# 세션 이력 #}
    <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
            <span><i class="bi bi-clock-history me-2"></i>이번 세션 입고</span>
            <span id="sessionBadge" class="badge" style="background:#3b82f6;">0건</span>
        </div>
        <div class="card-body p-3" id="historyArea" style="max-height:260px;overflow-y:auto;">
            <div class="text-center text-muted py-2" style="font-size:0.85rem;">아직 입고 내역이 없습니다</div>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
const CSRF = document.querySelector('meta[name="csrf-token"]')?.content || '';
let sessionLog = [];

const barcodeInput  = document.getElementById('barcodeInput');
const qtyInput      = document.getElementById('qtyInput');
const lotInput      = document.getElementById('lotInput');
const locationSel   = document.getElementById('locationSelect');
const inboundBtn    = document.getElementById('inboundBtn');
const resultArea    = document.getElementById('resultArea');
const historyArea   = document.getElementById('historyArea');
const sessionBadge  = document.getElementById('sessionBadge');
const errBanner     = document.getElementById('errBanner');

barcodeInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); processInbound(); } });
document.addEventListener('click', e => {
    if (!e.target.closest('select,input,button,a')) barcodeInput.focus();
});

function processInbound() {
    const barcode = barcodeInput.value.trim();
    const locId   = locationSel.value;
    const qty     = parseInt(qtyInput.value) || 1;
    const lot     = lotInput.value.trim();

    if (!locId)   { showErr('로케이션을 먼저 선택해주세요.'); return; }
    if (!barcode) { showErr('바코드를 스캔해주세요.'); return; }

    inboundBtn.disabled = true;

    fetch('/field/api/inbound', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
        body: JSON.stringify({ barcode, location_id: locId, quantity: qty, lot_number: lot })
    })
    .then(r => r.json())
    .then(d => {
        inboundBtn.disabled = false;
        if (d.ok) {
            beep(880, 0.12);
            showResult(true, `${d.sku_name} ${qty}개 입고 완료 (재고: ${d.current_stock}개)`);
            addLog(d.sku_name, d.sku_code, qty);
            barcodeInput.value = '';
            qtyInput.value = '1';
            barcodeInput.focus();
        } else {
            beep(300, 0.3, 'square');
            showErr(d.error || '처리 실패');
            showResult(false, d.error || '처리 실패');
        }
    })
    .catch(() => { inboundBtn.disabled = false; showErr('네트워크 오류'); });
}

function showResult(ok, msg) {
    resultArea.innerHTML = `<div class="result-card ${ok ? 'success' : 'error'}">
        <div class="d-flex align-items-center gap-2">
            <i class="bi ${ok ? 'bi-check-circle-fill text-success' : 'bi-x-circle-fill text-danger'}" style="font-size:1.4rem;"></i>
            <span style="font-size:1rem;font-weight:600;">${msg}</span>
        </div></div>`;
    setTimeout(() => { resultArea.innerHTML = ''; }, 4000);
}

function addLog(name, code, qty) {
    const t = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    sessionLog.unshift({ name, code, qty, t });
    sessionBadge.textContent = sessionLog.length + '건';
    historyArea.innerHTML = sessionLog.map(l =>
        `<div class="history-row">
            <span><strong>${l.name}</strong> <small class="text-muted">${l.code}</small></span>
            <span class="fw-bold" style="color:#3b82f6;">${l.qty}개</span>
            <small class="text-muted">${l.t}</small>
        </div>`).join('');
}

function showErr(msg) {
    errBanner.textContent = msg;
    errBanner.classList.add('show');
    setTimeout(() => errBanner.classList.remove('show'), 3000);
}

function beep(freq, dur, type='sine') {
    try {
        const ctx = new AudioContext();
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = type; o.frequency.value = freq; g.gain.value = 0.15;
        o.connect(g); g.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + dur);
    } catch(e) {}
}

window.addEventListener('DOMContentLoaded', () => barcodeInput.focus());
</script>
{% endblock %}
