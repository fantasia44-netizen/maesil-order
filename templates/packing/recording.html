{% extends "packing/packing_base.html" %}

{% block title %}녹화 모드 — 패킹센터{% endblock %}

{% block content %}
<style>
    .rec-container { display:flex; gap:16px; height:calc(100vh - 140px); padding:8px; }
    .rec-left { flex:2; display:flex; flex-direction:column; gap:10px; }
    .rec-right { flex:1; min-width:320px; }

    /* 카메라 */
    .camera-wrap {
        position:relative; flex:1; background:#000; border-radius:8px; overflow:hidden;
        display:flex; align-items:center; justify-content:center;
    }
    .camera-wrap video { width:100%; height:100%; object-fit:cover; }
    .camera-placeholder { color:var(--pk-muted); text-align:center; }
    .camera-placeholder i { font-size:3rem; display:block; margin-bottom:8px; }

    /* 녹화 표시 */
    .rec-indicator {
        position:absolute; top:12px; left:12px;
        display:none; align-items:center; gap:8px;
        background:rgba(0,0,0,0.7); padding:6px 14px; border-radius:20px;
        color:#fff; font-weight:600; font-size:0.95rem;
    }
    .rec-indicator.active { display:flex; }
    .rec-dot {
        width:12px; height:12px; border-radius:50%; background:#ff1744;
        animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* 상태 배지 */
    .state-badge {
        position:absolute; top:12px; right:12px;
        padding:6px 16px; border-radius:20px; font-size:0.85rem; font-weight:600;
    }
    .state-idle { background:var(--pk-header); color:var(--pk-muted); }
    .state-recording { background:#b71c1c; color:#ffcdd2; }
    .state-completing { background:#e65100; color:#ffe0b2; }
    .state-done { background:#1b5e20; color:#a5d6a7; }

    /* 바코드 입력 */
    .barcode-area {
        background:var(--pk-darker); border:2px solid var(--pk-header);
        border-radius:8px; padding:10px 16px; display:flex; align-items:center; gap:10px;
    }
    .barcode-area.recording { border-color:#ff5252; }
    .barcode-area.all-done { border-color:#4caf50; }
    .barcode-area i { font-size:1.5rem; color:var(--pk-primary); }
    .barcode-area input {
        flex:1; background:transparent; border:none; outline:none;
        color:#fff; font-size:1.2rem; font-family:monospace;
    }
    .barcode-area input::placeholder { color:var(--pk-muted); }

    /* 주문정보 패널 */
    .order-panel {
        background:var(--pk-darker); border:2px solid var(--pk-header);
        border-radius:8px; padding:16px; height:100%;
        display:flex; flex-direction:column; gap:10px; overflow-y:auto;
        transition: border-color 0.3s;
    }
    .order-panel.all-verified { border-color:#4caf50; }
    .order-panel h5 { color:var(--pk-text); margin:0; font-size:1rem; }
    .order-field { display:flex; justify-content:space-between; padding:5px 0;
                   border-bottom:1px solid var(--pk-header); font-size:0.9rem; }
    .order-label { color:var(--pk-muted); font-size:0.8rem; }
    .order-value { color:#fff; font-weight:500; }

    /* 제품 목록 */
    .product-list { flex:1; display:flex; flex-direction:column; gap:6px; }
    .product-item {
        background:var(--pk-header); padding:10px 12px; border-radius:8px;
        display:flex; align-items:center; gap:10px; transition: all 0.3s;
        border-left: 4px solid transparent;
    }
    .product-item.scanned {
        background:#1b3a1b; border-left-color:#4caf50;
    }
    .product-item.active-scan {
        animation: scanFlash 0.4s ease;
    }
    @keyframes scanFlash {
        0% { background:#2e7d32; transform:scale(1.02); }
        100% { background:#1b3a1b; transform:scale(1); }
    }
    .product-check {
        width:22px; height:22px; border-radius:50%; border:2px solid var(--pk-muted);
        display:flex; align-items:center; justify-content:center;
        font-size:0.75rem; color:transparent; flex-shrink:0;
    }
    .product-item.scanned .product-check {
        border-color:#4caf50; color:#4caf50; background:rgba(76,175,80,0.15);
    }
    .product-info { flex:1; min-width:0; }
    .product-name { color:var(--pk-text); font-size:0.9rem; font-weight:500;
                    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .product-barcode { color:var(--pk-muted); font-size:0.7rem; font-family:monospace; }
    .product-qty {
        text-align:right; flex-shrink:0;
    }
    .product-qty-num {
        font-size:1.2rem; font-weight:700; color:var(--pk-primary);
    }
    .product-item.scanned .product-qty-num { color:#4caf50; }
    .product-qty-label { font-size:0.65rem; color:var(--pk-muted); }
    .product-progress {
        width:50px; height:6px; background:var(--pk-darker); border-radius:3px;
        overflow:hidden; flex-shrink:0;
    }
    .product-progress-bar {
        height:100%; background:var(--pk-primary); border-radius:3px;
        transition: width 0.3s;
    }
    .product-item.scanned .product-progress-bar { background:#4caf50; }

    /* 완료 메시지 */
    .all-done-msg {
        display:none; text-align:center; padding:12px;
        background:rgba(76,175,80,0.15); border-radius:8px;
        color:#4caf50; font-weight:600;
    }
    .all-done-msg.show { display:block; }

    /* 완료 버튼 */
    .btn-complete {
        display:none; width:100%; padding:14px; border:none; border-radius:8px;
        font-size:1.1rem; font-weight:700; cursor:pointer; transition:all 0.3s;
        background:#455a64; color:#cfd8dc;
    }
    .btn-complete.show { display:block; }
    .btn-complete.ready {
        background:#2e7d32; color:#fff;
        animation: pulseGreen 1.5s ease infinite;
    }
    @keyframes pulseGreen {
        0%,100% { box-shadow:0 0 0 0 rgba(76,175,80,0.4); }
        50% { box-shadow:0 0 0 10px rgba(76,175,80,0); }
    }

    /* 안내 메시지 */
    .guide-msg {
        text-align:center; padding:40px 20px; color:var(--pk-muted);
    }
    .guide-msg i { font-size:2.5rem; display:block; margin-bottom:12px; }
    .guide-msg .step { color:var(--pk-primary); font-weight:600; }

    /* 토스트/오버레이 */
    .toast-area { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9999; }
    .upload-overlay {
        display:none; position:absolute; top:0; left:0; right:0; bottom:0;
        background:rgba(0,0,0,0.8); z-index:10;
        align-items:center; justify-content:center; flex-direction:column; gap:12px;
        color:#fff; border-radius:8px;
    }
    .upload-overlay.active { display:flex; }

    /* 스캔 카운터 */
    .scan-counter {
        text-align:center; padding:8px; background:var(--pk-header); border-radius:6px;
        font-size:0.9rem;
    }
    .scan-counter .done { color:#4caf50; font-weight:700; font-size:1.1rem; }
    .scan-counter .total { color:var(--pk-muted); }

    @media (max-width:768px) {
        .rec-container { flex-direction:column; height:auto; }
        .rec-right { min-width:auto; }
    }
</style>

<!-- 메인 컨테이너 -->
<div class="rec-container">
    <!-- 왼쪽: 카메라 + 바코드 입력 -->
    <div class="rec-left">
        <div class="camera-wrap" id="cameraWrap">
            <div class="camera-placeholder" id="cameraPlaceholder">
                <i class="bi bi-camera-video"></i>
                카메라 연결 중...
            </div>
            <video id="cameraPreview" autoplay muted playsinline style="display:none;"></video>

            <!-- 녹화 표시 -->
            <div class="rec-indicator" id="recIndicator">
                <div class="rec-dot"></div>
                <span>REC</span>
                <span id="recTimer">00:00</span>
            </div>

            <!-- 상태 배지 -->
            <div class="state-badge state-idle" id="stateBadge">대기</div>

            <!-- 업로드 오버레이 -->
            <div class="upload-overlay" id="uploadOverlay">
                <div class="spinner-border text-light" role="status"></div>
                <div>영상 업로드 중...</div>
                <div id="uploadSize" style="font-size:0.85rem; color:#aaa;"></div>
            </div>
        </div>

        <!-- 바코드 입력 -->
        <div class="barcode-area" id="barcodeArea">
            <i class="bi bi-upc-scan"></i>
            <input type="text" id="barcodeInput" placeholder="송장 바코드를 스캔하세요"
                   autocomplete="off" autofocus>
            <span id="barcodeStatus" style="font-size:0.8rem; color:var(--pk-muted);"></span>
        </div>
    </div>

    <!-- 오른쪽: 주문 정보 + 제품 목록 -->
    <div class="rec-right">
        <div class="order-panel" id="orderPanel">
            <h5><i class="bi bi-clipboard-data me-2"></i>주문 정보</h5>

            <!-- 대기 상태 안내 -->
            <div class="guide-msg" id="guideMsg">
                <i class="bi bi-upc-scan"></i>
                <div class="step">송장 바코드를 스캔하세요</div>
                <div style="margin-top:12px; font-size:0.85rem;">
                    스캔 즉시 녹화가 시작되고<br>
                    제품 바코드를 하나씩 찍어주세요
                </div>
                <div style="margin-top:20px; font-size:0.75rem; color:var(--pk-muted);">
                    USB 바코드 스캐너 또는 직접 입력 후 Enter
                </div>
            </div>

            <!-- 주문 상세 (녹화 시작 후 표시) -->
            <div id="orderDetail" style="display:none;">
                <div class="order-field">
                    <span class="order-label">채널</span>
                    <span class="order-value" id="odChannel">-</span>
                </div>
                <div class="order-field">
                    <span class="order-label">주문번호</span>
                    <span class="order-value" id="odOrderNo">-</span>
                </div>
                <div class="order-field">
                    <span class="order-label">수취인</span>
                    <span class="order-value" id="odRecipient">-</span>
                </div>
                <div class="order-field">
                    <span class="order-label">송장번호</span>
                    <span class="order-value" id="odBarcode" style="font-family:monospace;">-</span>
                </div>

                <!-- 스캔 카운터 -->
                <div class="scan-counter">
                    <i class="bi bi-check2-square me-1"></i>
                    제품 스캔: <span class="done" id="scanDone">0</span>
                    <span class="total">/ <span id="scanTotal">0</span></span>
                </div>

                <!-- 제품 목록 -->
                <div class="product-list" id="productList"></div>

                <!-- 전체 완료 메시지 -->
                <div class="all-done-msg" id="allDoneMsg">
                    <i class="bi bi-check-circle-fill me-1"></i>모든 제품 검증 완료!
                </div>

                <!-- 완료 버튼 -->
                <button class="btn-complete" id="btnComplete" onclick="handleComplete()">
                    <i class="bi bi-stop-circle me-2"></i>녹화 종료 및 저장
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 토스트 영역 -->
<div class="toast-area">
    <div class="toast align-items-center border-0" id="toastEl" role="alert" data-bs-delay="3000">
        <div class="d-flex">
            <div class="toast-body" id="toastMsg"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script>
const CSRF_TOKEN = '{{ csrf_token() }}';

// ── 상태 관리 ──
const State = { IDLE: 'IDLE', RECORDING: 'RECORDING', COMPLETING: 'COMPLETING' };

let state = State.IDLE;
let currentBarcode = null;       // 현재 송장 바코드
let currentOrderData = null;     // 현재 주문 데이터
let currentJobId = null;         // 현재 packing_jobs.id
let productItems = [];           // [{product_name, barcode, totalQty, scannedQty}, ...]
let mediaRecorder = null;
let recordedChunks = [];
let cameraStream = null;
let timerInterval = null;
let recordingStartTime = null;
let audioCtx = null;
let pendingNextBarcode = null;   // 다음 송장 바코드 (연속 작업)

// ── DOM 참조 ──
const $barcodeInput = document.getElementById('barcodeInput');
const $barcodeArea = document.getElementById('barcodeArea');
const $cameraPreview = document.getElementById('cameraPreview');
const $cameraPlaceholder = document.getElementById('cameraPlaceholder');
const $recIndicator = document.getElementById('recIndicator');
const $recTimer = document.getElementById('recTimer');
const $stateBadge = document.getElementById('stateBadge');
const $guideMsg = document.getElementById('guideMsg');
const $orderDetail = document.getElementById('orderDetail');
const $orderPanel = document.getElementById('orderPanel');
const $uploadOverlay = document.getElementById('uploadOverlay');
const $uploadSize = document.getElementById('uploadSize');
const $btnComplete = document.getElementById('btnComplete');
const $allDoneMsg = document.getElementById('allDoneMsg');
const $scanDone = document.getElementById('scanDone');
const $scanTotal = document.getElementById('scanTotal');

// ── 초기화 ──
document.addEventListener('DOMContentLoaded', () => {
    initCamera();
    initBarcodeInput();
});

// ── 카메라 ──
async function initCamera() {
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { width:{ideal:1280}, height:{ideal:720}, facingMode:'environment' },
            audio: false,
        });
        $cameraPreview.srcObject = cameraStream;
        $cameraPreview.style.display = 'block';
        $cameraPlaceholder.style.display = 'none';
    } catch(e) {
        $cameraPlaceholder.innerHTML =
            '<i class="bi bi-camera-video-off"></i>' +
            '카메라를 사용할 수 없습니다<br>' +
            '<small style="color:#ff5252;">' + e.message + '</small>';
    }
}

// ── 바코드 입력 ──
function initBarcodeInput() {
    $barcodeInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const barcode = $barcodeInput.value.trim();
            $barcodeInput.value = '';
            if (barcode) handleBarcodeScan(barcode);
        }
    });
    document.addEventListener('click', (e) => {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') {
            $barcodeInput.focus();
        }
    });
    $barcodeInput.focus();
}

// ═══════════════════════════════════════════════
// 바코드 처리 핵심
// ═══════════════════════════════════════════════
async function handleBarcodeScan(barcode) {
    if (state === State.COMPLETING) return;

    if (state === State.IDLE) {
        // ── IDLE: 송장 바코드 → 조회 + 즉시 녹화 시작 ──
        await lookupAndStartRecording(barcode);
    } else if (state === State.RECORDING) {
        // ── RECORDING: 제품 바코드 or 새 송장 ──
        const matched = tryMatchProductBarcode(barcode);
        if (!matched) {
            // 제품에 없는 바코드 → 새 송장으로 간주 → 현재 녹화 종료 + 새 녹화
            pendingNextBarcode = barcode;
            await stopRecording();
        }
    }
    $barcodeInput.focus();
}

// ── 송장 조회 + 녹화 시작 ──
async function lookupAndStartRecording(barcode) {
    playBeep(1200, 150);
    document.getElementById('barcodeStatus').textContent = '조회 중...';

    try {
        const res = await fetch('/packing/api/lookup-barcode', {
            method: 'POST',
            headers: {'Content-Type':'application/json', 'X-CSRFToken': CSRF_TOKEN},
            body: JSON.stringify({barcode}),
        });
        const json = await res.json();

        if (!json.ok) {
            playBeep(400, 300);
            showToast(json.error, 'danger');
            speak(json.error);
            document.getElementById('barcodeStatus').textContent = '';
            return;
        }

        currentBarcode = barcode;
        currentOrderData = json.data;
        document.getElementById('barcodeStatus').textContent = '';

        // 제품 목록 초기화
        initProductItems(json.data.items || []);
        displayOrderInfo(json.data);

        // 즉시 녹화 시작
        await startRecording();

        // TTS: 주문 정보
        speakOrderInfo(json.data);

    } catch(e) {
        showToast('서버 연결 실패', 'danger');
        document.getElementById('barcodeStatus').textContent = '';
    }
}

// ── 제품 목록 초기화 ──
function initProductItems(items) {
    // 같은 바코드끼리 합산 (동일 제품 여러 행 가능)
    const map = new Map();
    items.forEach(it => {
        const bc = (it.barcode || '').trim();
        const key = bc || it.product_name; // 바코드 없으면 제품명 기준
        if (map.has(key)) {
            const existing = map.get(key);
            existing.totalQty += Math.abs(it.qty || 0);
        } else {
            map.set(key, {
                product_name: it.product_name || it.option_name || '-',
                barcode: bc,
                totalQty: Math.abs(it.qty || 0),
                scannedQty: 0,
            });
        }
    });
    productItems = Array.from(map.values());
}

// ── 제품 바코드 매칭 ──
function tryMatchProductBarcode(barcode) {
    // 제품 바코드 목록에서 찾기
    const item = productItems.find(p => p.barcode && p.barcode === barcode);
    if (!item) return false;

    if (item.scannedQty >= item.totalQty) {
        // 이미 다 스캔된 제품
        playBeep(400, 200);
        speak('이미 스캔 완료');
        showToast(`${item.product_name} — 이미 스캔 완료됨`, 'warning');
        // 하이라이트만
        highlightProduct(item);
        return true;
    }

    // 수량 차감
    item.scannedQty += 1;
    playBeep(1200, 150);
    speak(item.product_name);

    // UI 업데이트
    renderProductList();
    highlightProduct(item);

    // 전체 완료 체크
    checkAllDone();

    return true;
}

// ── 제품 하이라이트 (스캔 시 깜빡임) ──
function highlightProduct(item) {
    const idx = productItems.indexOf(item);
    const el = document.querySelector(`[data-product-idx="${idx}"]`);
    if (el) {
        el.classList.add('active-scan');
        setTimeout(() => el.classList.remove('active-scan'), 500);
    }
}

// ── 전체 완료 체크 ──
function checkAllDone() {
    const totalRequired = productItems.reduce((s, p) => s + p.totalQty, 0);
    const totalScanned = productItems.reduce((s, p) => s + p.scannedQty, 0);
    const allDone = totalScanned >= totalRequired && totalRequired > 0;

    $allDoneMsg.classList.toggle('show', allDone);
    $orderPanel.classList.toggle('all-verified', allDone);
    $barcodeArea.classList.toggle('all-done', allDone);
    $btnComplete.classList.toggle('ready', allDone);

    if (allDone) {
        playBeep(1500, 300);
        speak('모든 제품 검증 완료');
        updateState('DONE');
    }
}

// ── 주문 정보 표시 ──
function displayOrderInfo(data) {
    $guideMsg.style.display = 'none';
    $orderDetail.style.display = 'flex';
    $orderDetail.style.flexDirection = 'column';
    $orderDetail.style.gap = '8px';
    $orderDetail.style.flex = '1';

    document.getElementById('odChannel').textContent = data.channel || '-';
    document.getElementById('odOrderNo').textContent = data.order_no || '-';
    document.getElementById('odRecipient').textContent = data.recipient_name || '-';
    document.getElementById('odBarcode').textContent = currentBarcode || '-';

    const totalQty = productItems.reduce((s, p) => s + p.totalQty, 0);
    $scanTotal.textContent = totalQty;
    $scanDone.textContent = '0';

    renderProductList();

    $btnComplete.classList.add('show');
    $btnComplete.classList.remove('ready');
}

// ── 제품 목록 렌더링 ──
function renderProductList() {
    const $list = document.getElementById('productList');
    $list.innerHTML = '';

    let totalScanned = 0;

    productItems.forEach((item, idx) => {
        const done = item.scannedQty >= item.totalQty;
        const pct = item.totalQty > 0 ? Math.min(100, (item.scannedQty / item.totalQty) * 100) : 0;
        totalScanned += item.scannedQty;

        const div = document.createElement('div');
        div.className = 'product-item' + (done ? ' scanned' : '');
        div.dataset.productIdx = idx;
        div.innerHTML = `
            <div class="product-check"><i class="bi bi-check-lg"></i></div>
            <div class="product-info">
                <div class="product-name">${item.product_name}</div>
                <div class="product-barcode">${item.barcode || '(바코드 없음)'}</div>
            </div>
            <div class="product-qty">
                <div class="product-qty-num">${item.scannedQty}/${item.totalQty}</div>
                <div class="product-qty-label">스캔/전체</div>
            </div>
            <div class="product-progress">
                <div class="product-progress-bar" style="width:${pct}%"></div>
            </div>
        `;
        $list.appendChild(div);
    });

    $scanDone.textContent = totalScanned;
}

// ── 녹화 시작 ──
async function startRecording() {
    if (!cameraStream) {
        showToast('카메라가 연결되어 있지 않습니다.', 'danger');
        return;
    }

    // 서버에 job 생성
    try {
        const res = await fetch('/packing/api/start-job', {
            method: 'POST',
            headers: {'Content-Type':'application/json', 'X-CSRFToken': CSRF_TOKEN},
            body: JSON.stringify({
                barcode: currentBarcode,
                ...currentOrderData,
            }),
        });
        const json = await res.json();
        if (!json.ok) {
            showToast(json.error || '작업 생성 실패', 'danger');
            return;
        }
        currentJobId = json.job_id;
    } catch(e) {
        showToast('서버 연결 실패', 'danger');
        return;
    }

    // MediaRecorder 시작
    recordedChunks = [];
    try {
        mediaRecorder = new MediaRecorder(cameraStream, {
            mimeType: 'video/webm;codecs=vp8',
            videoBitsPerSecond: {{ config.get('PACKING_VIDEO_BITRATE', 1000000) }},
        });
    } catch(e) {
        mediaRecorder = new MediaRecorder(cameraStream);
    }

    mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.start(1000);
    recordingStartTime = Date.now();
    updateState(State.RECORDING);

    // 타이머
    timerInterval = setInterval(() => {
        const elapsed = Date.now() - recordingStartTime;
        const min = String(Math.floor(elapsed / 60000)).padStart(2, '0');
        const sec = String(Math.floor((elapsed % 60000) / 1000)).padStart(2, '0');
        $recTimer.textContent = `${min}:${sec}`;
    }, 500);

    // 바코드 입력 안내 변경
    $barcodeInput.placeholder = '제품 바코드를 스캔하세요';
    $barcodeArea.classList.add('recording');

    playBeep(1500, 200);
}

// ── 완료 버튼 클릭 ──
async function handleComplete() {
    if (state !== State.RECORDING && state !== 'DONE') return;

    const totalRequired = productItems.reduce((s, p) => s + p.totalQty, 0);
    const totalScanned = productItems.reduce((s, p) => s + p.scannedQty, 0);

    if (totalScanned < totalRequired) {
        const remain = totalRequired - totalScanned;
        if (!confirm(`아직 ${remain}개 제품이 미스캔입니다.\n그래도 녹화를 종료하시겠습니까?`)) {
            $barcodeInput.focus();
            return;
        }
    }

    await stopRecording();
}

// ── 녹화 종료 ──
async function stopRecording() {
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        resetToIdle();
        return;
    }

    updateState(State.COMPLETING);
    clearInterval(timerInterval);
    const durationMs = Date.now() - recordingStartTime;

    playBeep(800, 300);

    return new Promise((resolve) => {
        mediaRecorder.onstop = async () => {
            const blob = new Blob(recordedChunks, {type:'video/webm'});
            const sizeMB = (blob.size / 1024 / 1024).toFixed(1);
            $uploadOverlay.classList.add('active');
            $uploadSize.textContent = `${sizeMB} MB`;

            // scanned_items 정보
            const scannedInfo = productItems.map(p => ({
                product_name: p.product_name,
                barcode: p.barcode,
                total_qty: p.totalQty,
                scanned_qty: p.scannedQty,
            }));

            const formData = new FormData();
            formData.append('video', blob, `${currentBarcode}.webm`);
            formData.append('job_id', currentJobId);
            formData.append('duration_ms', durationMs);
            formData.append('scanned_items', JSON.stringify(scannedInfo));
            formData.append('csrf_token', CSRF_TOKEN);

            try {
                const res = await fetch('/packing/api/complete-job', {
                    method: 'POST',
                    body: formData,
                });
                const json = await res.json();
                if (json.ok) {
                    showToast('녹화 완료! 영상이 저장되었습니다.', 'success');
                    speak('녹화 완료');
                } else {
                    showToast(json.error || '업로드 실패', 'danger');
                }
            } catch(e) {
                showToast('업로드 중 오류 발생', 'danger');
            }

            $uploadOverlay.classList.remove('active');

            // 다음 송장이 대기 중이면 연속 작업
            const nextBarcode = pendingNextBarcode;
            pendingNextBarcode = null;
            resetToIdle();

            if (nextBarcode) {
                // 약간 딜레이 후 다음 송장 자동 시작
                setTimeout(() => lookupAndStartRecording(nextBarcode), 300);
            }

            resolve();
        };
        mediaRecorder.stop();
    });
}

// ── 상태 초기화 ──
function resetToIdle() {
    currentBarcode = null;
    currentOrderData = null;
    currentJobId = null;
    productItems = [];
    mediaRecorder = null;
    recordedChunks = [];
    recordingStartTime = null;

    $guideMsg.style.display = 'block';
    $orderDetail.style.display = 'none';
    $recTimer.textContent = '00:00';
    $btnComplete.classList.remove('show', 'ready');
    $allDoneMsg.classList.remove('show');
    $orderPanel.classList.remove('all-verified');
    $barcodeArea.classList.remove('recording', 'all-done');
    $barcodeInput.placeholder = '송장 바코드를 스캔하세요';

    updateState(State.IDLE);
    $barcodeInput.focus();
}

// ── 상태 UI 업데이트 ──
function updateState(newState) {
    state = newState;
    const badgeMap = {
        IDLE:       {cls:'state-idle',      text:'대기'},
        RECORDING:  {cls:'state-recording',  text:'녹화 중'},
        COMPLETING: {cls:'state-completing', text:'저장 중'},
        DONE:       {cls:'state-done',       text:'검증 완료'},
    };
    const b = badgeMap[newState] || badgeMap.IDLE;
    $stateBadge.className = 'state-badge ' + b.cls;
    $stateBadge.textContent = b.text;

    $recIndicator.classList.toggle('active',
        newState === State.RECORDING || newState === 'DONE');
}

// ── TTS ──
function speak(text) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ko-KR';
    utt.rate = 1.1;
    speechSynthesis.speak(utt);
}

function speakOrderInfo(data) {
    const parts = [];
    if (data.channel) parts.push(data.channel);
    if (data.recipient_name) parts.push(`수취인 ${data.recipient_name}`);
    if (data.items && data.items.length > 0) {
        const first = data.items[0];
        parts.push(`${first.product_name} ${first.qty}개`);
        if (data.items.length > 1) parts.push(`외 ${data.items.length - 1}건`);
    }
    parts.push('녹화를 시작합니다');
    if (parts.length > 0) speak(parts.join(', '));
}

// ── 비프음 ──
function playBeep(freq, duration) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.value = 0.3;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        setTimeout(() => { osc.stop(); }, duration);
    } catch(e) {}
}

// ── 토스트 ──
function showToast(msg, type) {
    const el = document.getElementById('toastEl');
    const msgEl = document.getElementById('toastMsg');
    msgEl.textContent = msg;
    el.className = 'toast align-items-center border-0 text-bg-' + (type||'info');
    const t = bootstrap.Toast.getOrCreateInstance(el);
    t.show();
}
</script>
