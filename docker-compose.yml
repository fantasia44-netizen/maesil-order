version: "3.8"

services:
  autotool:
    build: .
    container_name: autotool-web
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=haeser-nas-autotool-secret-2026
      - TZ=Asia/Seoul
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/login')"]
      interval: 60s
      timeout: 10s
      retries: 3
