version: "3.8"

services:
  autotool:
    build: .
    container_name: autotool-web
    restart: unless-stopped
    ports:
      - "8080:5000"
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=haeser-nas-autotool-secret-2026
      - TZ=Asia/Seoul
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    mem_limit: 512m
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
      - ./config.py:/app/config.py:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/login')"]
      interval: 60s
      timeout: 10s
      retries: 3
